name: Keep Supabase alive

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ping Supabase REST API
        run: |
          set -a; source .env; set +a
          curl -fsS "$VITE_SUPABASE_URL/rest/v1/app_data?id=eq.singleton&select=id" \
            -H "apikey: $VITE_SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $VITE_SUPABASE_ANON_KEY" \
            -o /dev/null -w "Pinged Supabase — HTTP %{http_code}\n"
      - name: Keep this workflow enabled
        run: |
          AGE_DAYS=$(( ( $(date +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          echo "Last commit was $AGE_DAYS day(s) ago."
          if [ "$AGE_DAYS" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive to keep scheduled workflow enabled"
            git push
            echo "Pushed keepalive commit."
          fi
